<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helixa — Exact Header Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a14;
            --bg2: #0e0e1a;
            --surface: #13132a;
            --text: #f0eeff;
            --text2: #9a92c0;
            --accent: #b490ff;
            --accent2: #8b6aff;
            --teal: #6eecd8;
            --cool: #80d0ff;
            --warm: #f5a0d0;
            --dna-gradient: linear-gradient(135deg, #6eecd8, #80d0ff, #b490ff, #f5a0d0, #6eecd8);
            --dna-gradient-horizontal: linear-gradient(90deg, #6eecd8, #80d0ff, #b490ff, #f5a0d0, #6eecd8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Static gradient background - shades of #0a0a14 */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a0a14 0%, #0e0e1a 50%, #13132a 100%);
        }

        /* EXACT Helixa header clone - made glass */
        .nav {
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(8, 8, 16, 0.55);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            height: 64px;
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 0 2rem;
            justify-content: space-between;
        }

        .nav-logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--dna-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            background-size: 200% 100%;
            animation: 6s ease-in-out infinite holo-shimmer;
        }

        @keyframes holo-shimmer {
            0% { background-position: 0%; }
            50% { background-position: 100%; }
            100% { background-position: 0%; }
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text2);
            padding: 0.5rem 0.6rem;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
            position: relative;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .nav-link.active {
            color: var(--teal);
        }

        .nav-link.active::after {
            content: "";
            background: var(--dna-gradient-horizontal);
            border-radius: 1px;
            height: 2px;
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border: none;
            border-radius: 14px;
            padding: 0.75rem 1.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--dna-gradient);
            color: #0a0a0f;
            background-size: 200%;
            box-shadow: 0 4px 20px rgba(77, 142, 255, 0.15);
        }

        .btn-primary:hover {
            background-position: 100%;
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 96, 144, 0.3);
        }

        .btn-secondary {
            color: var(--text);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            border-image: var(--dna-gradient-horizontal) 1;
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-1px);
        }

        .content {
            padding-top:进宫
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>

    <nav class="nav">
        <div class="nav-logo-text">HELIXA</div>
        
        <div class="nav-links">
            <a href="#" class="nav-link active">Home</a>
            <a href="#" class="nav-link">Agents</a>
            <a href="#" class="nav-link">Cred</a>
            <a href="#" class="nav-link">Graph</a>
            <a href="#" class="nav-link">Services</a>
        </div>

        <div class="nav-actions">
            <button class="btn btn-primary">Connect Wallet</button>
            <button class="btn btn-secondary">Agent Login</button>
        </div>
    </nav>

    <div style="padding-top: 80px; text-align: center; padding: 2rem;">
        <h1 style="font-family: 'Orbitron', sans-serif; color: #6eecd8; margin-bottom: 1rem;">Exact Helixa Header Clone</h1>
        <p style="color: #9a92c0; max-width: 600px; margin: 0 auto; line-height: 1.6;">
            Header cloned exactly from helixa.xyz with glass effect (backdrop-filter: blur(20px)).<br>
            Background gradient uses shades of #0a0a14 → #0e0e1a → #13132a.<br>
            No color shifts, no animations on background.
        </p>
    </div>
</body>
</html>
