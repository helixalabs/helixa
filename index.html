<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helixa — Exact Header + Footer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a14;
            --bg2: #0e0e1a;
            --surface: #13132a;
            --text: #f0eeff;
            --text2: #9a92c0;
            --teal: #6eecd8;
            --cool: #80d0ff;
            --warm: #f5a0d0;
            --dna-gradient: linear-gradient(135deg, #6eecd8, #80d0ff, #b490ff, #f5a0d0, #6eecd8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Static gradient background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a0a14 0%, #0e0e1a 50%, #13132a 100%);
        }

        /* EXACT Helixa header */
        .nav {
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(8, 8, 16, 0.55);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            height: 64px;
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 0 2rem;
            justify-content: space-between;
        }

        /* Logo: helixa.xyz */
        .nav-logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--dna-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            background-size: 200% 100%;
            animation: 6s ease-in-out infinite holo-shimmer;
        }

        @keyframes holo-shimmer {
            0% { background-position: 0%; }
            50% { background-position: 100%; }
            100% { background-position: 0%; }
        }

        /* Header links - capitalized and narrow */
        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text2);
            padding: 0.5rem 0.6rem;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .nav-link.active {
            color: var(--teal);
        }

        /* CONNECT button - capitalized, 10px radius */
        .connect-btn {
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            background: transparent;
            border: 2px solid;
            border-image: var(--dna-gradient) 1;
            border-radius: 10px;
            padding: 0.75rem 1.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .connect-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--dna-gradient);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .connect-btn:hover {
            color: #0a0a0f;
        }

        .connect-btn:hover::before {
            opacity: 1;
        }

        /* Main content */
        .main-content {
            flex: 1;
            padding-top: 80px;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>

    <nav class="nav">
        <div class="nav-logo-text">helixa.xyz</div>
        
        <div class="nav-links">
            <a href="#" class="nav-link active">HOME</a>
            <a href="#" class="nav-link">AGENTS</a>
            <a href="#" class="nav-link">CRED</a>
            <a href="#" class="nav-link">GRAPH</a>
            <a href="#" class="nav-link">SERVICES</a>
        </div>

        <button class="connect-btn">CONNECT</button>
    </nav>

    <main class="main-content">
        <div style="text-align: center; padding: 2rem;">
            <h1 style="font-family: 'Orbitron', sans-serif; color: #6eecd8; margin-bottom: 1rem;">Helixa Header + Footer</h1>
            <p style="color: #9a92c0; max-width: 600px; margin: 0 auto; line-height: 1.6;">
                Exact match to helixa.xyz styling.
            </p>
        </div>
    </main>

    <!-- EXACT footer - matches header: no centered wrapper -->
    <footer style="
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(8, 8, 16, 0.7);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 1rem 2rem;
        margin-top: auto;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        color: #9a92c0;
        display: flex;
        align-items: center;
        gap: 1.5rem;
    ">
        <div style="
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #6eecd8;
            letter-spacing: 1px;
            text-transform: uppercase;
        ">
            HELIXA PROTOCOL
        </div>
        
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">GitHub</a>
            <span style="color: rgba(255, 255, 255, 0.3);">•</span>
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">Twitter</a>
            <span style="color: rgba(255, 255, 255, 0.3);">•</span>
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">Docs</a>
            <span style="color: rgba(255, 255, 255, 0.3);">•</span>
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">OpenSea</a>
        </div>
    </footer>
</body>
</html>
