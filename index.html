<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helixa — Glass Header</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a14;
            color: #fff;
            min-height: 100vh;
        }

        /* Static gradient background - no shift */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a0a14 0%, #141424 100%);
        }

        /* Glass header - Helixa style */
        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: #6eecd8;
            letter-spacing: 1px;
        }

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: #6eecd8;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(to right, #6eecd8, #80d0ff);
            color: #0a0a14;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #6eecd8;
            color: #6eecd8;
        }

        .content {
            padding-top: 80px;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>

    <header class="glass-header">
        <div class="logo">HELIXA</div>
        
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Agents</a>
            <a href="#">Cred</a>
            <a href="#">Graph</a>
            <a href="#">Services</a>
        </nav>

        <div class="actions">
            <button class="btn btn-primary">Connect Wallet</button>
            <button class="btn btn-outline">Agent Login</button>
        </div>
    </header>

    <div class="content">
        <h1 style="color: #6eecd8; margin-bottom: 1rem;">Glass Header Only</h1>
        <p style="color: rgba(255, 255, 255, 0.6);">Static gradient background, no color shift.<br>Header made glass with backdrop blur.</p>
    </div>
</body>
</html>
