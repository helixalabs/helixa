<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helixa — Exact Header + Footer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a14;
            --bg2: #0e0e1a;
            --surface: #13132a;
            --text: #f0eeff;
            --text2: #9a92c0;
            --teal: #6eecd8;
            --cool: #80d0ff;
            --warm: #f5a0d0;
            --dna-gradient: linear-gradient(135deg, #6eecd8, #80d0ff, #b490ff, #f5a0d0, #6eecd8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* EXACT background from synagent.helixa.xyz - adjusted colors */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0a0a14;
            overflow: hidden;
        }

        /* Canvas for particles (matching theirs) */
        .bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.18;
            pointer-events: none;
        }

        /* Grid lines (repeating-linear-gradient) */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.22;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(110, 236, 216, 0.04) 3px);
        }

        /* Center radial glow */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(110, 236, 216, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* EXACT Helixa header */
        .nav {
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(8, 8, 16, 0.55);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            height: 64px;
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 0 2rem;
            justify-content: space-between;
        }

        /* Logo: helixa.xyz */
        .nav-logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--dna-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            background-size: 200% 100%;
            animation: 6s ease-in-out infinite holo-shimmer;
        }

        @keyframes holo-shimmer {
            0% { background-position: 0%; }
            50% { background-position: 100%; }
            100% { background-position: 0%; }
        }

        /* Header links - capitalized and narrow */
        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text2);
            padding: 0.5rem 0.6rem;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .nav-link.active {
            color: var(--teal);
        }

        /* CONNECT button - 1px gradient border, 10px radius */
        .connect-btn {
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            background: transparent;
            border-radius: 10px;
            padding: 0.75rem 1.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            border: 1px solid transparent;
            background: linear-gradient(var(--bg), var(--bg)) padding-box,
                        var(--dna-gradient) border-box;
        }

        .connect-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--dna-gradient);
            border-radius: 10px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .connect-btn:hover {
            color: #0a0a0f;
        }

        .connect-btn:hover::before {
            opacity: 1;
        }

        /* Main content */
        .main-content {
            flex: 1;
            padding-top: 80px;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- EXACT background from synagent.helixa.xyz -->
    <div class="background-container">
        <canvas class="bg-canvas" id="bgCanvas"></canvas>
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
    </div>

    <nav class="nav">
        <div class="nav-logo-text">helixa.xyz</div>
        
        <div class="nav-links">
            <a href="#" class="nav-link active">HOME</a>
            <a href="#" class="nav-link">AGENTS</a>
            <a href="#" class="nav-link">CRED</a>
            <a href="#" class="nav-link">GRAPH</a>
            <a href="#" class="nav-link">SERVICES</a>
        </div>

        <button class="connect-btn">CONNECT</button>
    </nav>

    <main class="main-content">
        <!-- Empty hero section -->
    </main>

    <!-- EXACT footer - matches header: no centered wrapper -->
    <footer style="
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(8, 8, 16, 0.7);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 1rem 2rem;
        margin-top: auto;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        color: #9a92c0;
        display: flex;
        align-items: center;
        gap: 1.5rem;
    ">
        <div style="
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #6eecd8;
            letter-spacing: 1px;
            text-transform: uppercase;
        ">
            HELIXA PROTOCOL
        </div>
        
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">GitHub</a>
            <span style="color: rgba(255, 255, 255, 0.3);">•</span>
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">Twitter</a>
            <span style="color: rgba(255, 255, 255, 0.3);">•</span>
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">Docs</a>
            <span style="color: rgba(255, 255, 255, 0.3);">•</span>
            <a href="#" style="color: #9a92c0; text-decoration: none; transition: color 0.2s;">OpenSea</a>
        </div>
    </footer>

    <script>
        // Simple canvas animation similar to synagent.helixa.xyz
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const colors = [
            'rgba(110, 236, 216, 0.15)',  // teal
            'rgba(128, 208, 255, 0.15)',   // blue
            'rgba(180, 144, 255, 0.15)',   // lavender
            'rgba(245, 160, 208, 0.15)'    // pink
        ];
        
        // Create particles
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                color: colors[Math.floor(Math.random() * colors.length)],
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.5 + 0.1
            });
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                
                // Wrap around edges
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Resize canvas on window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
